name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Generate image tag
        id: tag
        run: |
          TAG="$(date +%Y%m%d%H%M%S)-$(git rev-parse --short HEAD)"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Sanity check tag
        run: |
          echo "IMAGE_TAG=${IMAGE_TAG}"
          test -n "$IMAGE_TAG" || (echo "IMAGE_TAG is empty" && exit 1)

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-ui:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/admin-ui:latest

  deploy:
    runs-on: ubuntu-24.04
    needs: [build-and-push]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: devapihub/argocd
          ref: main
          token: ${{ secrets.GH_PAT_PUSH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install yq
        run: |
          YQ_VERSION=v4.44.3
          curl -sL https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update image tag
        env:
          IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/admin-ui
          FILE: app/admin-ui/k8s/admin-ui-deployment.yaml
          CONTAINER: admin-ui
        run: |
          test -f "$FILE" || { echo "Not found: $FILE"; exit 1; }
          yq -i '
            (.spec.template.spec.containers[]
              | select(.name == env(CONTAINER))
              | .image) = (env(IMAGE_REPO) + ":" + env(IMAGE_TAG))
          ' "$FILE"
          git --no-pager diff -- "$FILE" || true

      - name: Commit & push
        env:
          GH_PAT: ${{ secrets.GH_PAT_PUSH }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/admin-ui/k8s/admin-ui-deployment.yaml
          git commit -m "chore(admin-ui): bump image to ${IMAGE_TAG}" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/devapihub/argocd.git
          git push origin HEAD:main

      - name: Notify Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP: admin-ui
          TAG: ${{ env.IMAGE_TAG }}
        run: |
          MSG="✅ ArgoCD triggered: $APP → image:$TAG (manifest pushed)."
          curl -s --fail \
            -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="${MSG}" \
            -d parse_mode="HTML"
